server:
  port: ${SERVER_PORT:8080}

interview-assistant:
  # 第一阶段 MVP 使用固定客户端密钥，正式上线前替换为用户登录 + JWT + 数据库订阅校验
  client-secret: ${INTERVIEW_ASSISTANT_CLIENT_SECRET:change-me-before-production}
  aliyun:
    nls-app-key: ${ALIYUN_NLS_APP_KEY:}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    nls-endpoint: ${ALIYUN_NLS_ENDPOINT:wss://nls-gateway-cn-shanghai.aliyuncs.com/ws/v1}
  bailian:
    api-key: ${BAILIAN_API_KEY:}
    model: ${BAILIAN_MODEL:deepseek-v3}
    endpoint: ${BAILIAN_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
