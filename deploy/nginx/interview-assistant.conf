# Nginx 生产配置样例
# 替换 your-domain.com，并将证书路径改成你服务器上的真实路径。
# 推荐：前端 www.your-domain.com，后端 api.your-domain.com。

server {
    listen 80;
    server_name www.your-domain.com your-domain.com api.your-domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.your-domain.com your-domain.com;

    ssl_certificate /etc/letsencrypt/live/www.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.your-domain.com/privkey.pem;

    root /opt/interview-assistant/web/dist;
    index index.html;

    client_max_body_size 20m;

    location /downloads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    ssl_certificate /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
